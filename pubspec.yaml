name: hotel
description: "A new Hotel project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.3+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2

  # Base de données SQLite cross-platform
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.24

  # Chemins système
  path: ^1.9.0
  path_provider: ^2.1.3

  # Import fichier MDB (Android — file picker)
  file_picker: ^8.1.2

  # Sécurité mots de passe
  crypto: ^3.0.3

  # Format dates
  intl: ^0.19.0

  # Icons Material
  material_design_icons_flutter: ^7.0.7296

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

